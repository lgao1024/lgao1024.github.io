---
layout: page
title: "Tags"
description: "Browse all tags"
header-style: minimal
sidebar: false
body-class: home-hub
permalink: /tags/
---

<section class="home-section">
    <h2 class="home-section-title">All tags</h2>
    <div class="home-tag-list">
        {% for tag in site.tags %}
        <a class="home-tag" href="{{ site.baseurl }}/tags/{{ tag[0] | slugify }}/"># {{ tag[0] }} ({{ tag[1].size }})</a>
        {% endfor %}
    </div>
</section>
